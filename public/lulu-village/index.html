<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魯魯末日村 · 驚喜角落</title>
    <link rel="stylesheet" href="/lulu-village/style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="topbar" aria-label="村莊狀態">
        <div>
          <p class="eyebrow">第 <span id="dayCount">1</span> 天 · <span id="phaseName">廢墟期</span></p>
          <h1>魯魯末日村</h1>
        </div>
        <div class="resources" aria-label="資源">
          <button class="resource" data-resource="wood" type="button" aria-label="木頭" title="木頭（ㄇㄨˋ ㄊㄡˊ）— 點我收集！">
            <span class="resource-icon wood">木</span>
            <strong id="woodCount">0</strong>
          </button>
          <button class="resource" data-resource="food" type="button" aria-label="食物" title="食物（ㄕˊ ㄨˋ）— 點我收集！">
            <span class="resource-icon food">食</span>
            <strong id="foodCount">0</strong>
          </button>
          <button class="resource" data-resource="stone" type="button" aria-label="石頭" title="石頭（ㄕˊ ㄊㄡˊ）— 點我收集！">
            <span class="resource-icon stone">石</span>
            <strong id="stoneCount">0</strong>
          </button>
        </div>
      </section>

      <section class="village-wrap" aria-label="村莊地圖">
        <div class="restore-meter" aria-label="復興進度">
          <span>村莊復興</span>
          <strong id="restorePercent">0%</strong>
          <i><b id="restoreFill"></b></i>
        </div>
        <div class="sky"></div>
        <div class="village" id="village">
          <span class="cloud cloud-a"></span>
          <span class="cloud cloud-b"></span>
          <span class="ruin ruin-a"></span>
          <span class="ruin ruin-b"></span>
          <span class="path"></span>
          <span class="sprout sprout-a"></span>
          <span class="sprout sprout-b"></span>
          <span class="sprout sprout-c"></span>
          <span class="lamp lamp-a"></span>
          <span class="lamp lamp-b"></span>
          <button class="gather pile wood-pile" data-gather="wood" type="button" aria-label="收集木頭">
            <span>木</span>
          </button>
          <button class="gather pile food-pile" data-gather="food" type="button" aria-label="收集食物">
            <span>食</span>
          </button>
          <button class="gather pile stone-pile" data-gather="stone" type="button" aria-label="收集石頭">
            <span>石</span>
          </button>
          <button class="plot plot-home" data-building="home" type="button" aria-label="小屋" title="小屋（ㄒㄧㄠˇ ㄨ）🏠 需要：木頭8＋石頭4">
            <span class="building-icon"><img src="/lulu-village/assets/home.png" alt="小屋"></span>
            <span class="plot-label">🏠 小屋</span>
          </button>
          <button class="plot plot-kitchen" data-building="kitchen" type="button" aria-label="廚房" title="廚房（ㄔㄨˊ ㄈㄤˊ）🍳 需要：木頭10＋食物6＋石頭5">
            <span class="building-icon"><img src="/lulu-village/assets/kitchen.png" alt="廚房"></span>
            <span class="plot-label">🍳 廚房</span>
          </button>
          <button class="plot plot-greenhouse" data-building="greenhouse" type="button" aria-label="溫室" title="溫室（ㄨㄣ ㄕˋ）🌿 需要：木頭12＋食物10＋石頭6">
            <span class="building-icon"><img src="/lulu-village/assets/greenhouse.png" alt="溫室"></span>
            <span class="plot-label">🌿 溫室</span>
          </button>
          <button class="plot plot-garden" data-building="garden" type="button" aria-label="花圃" title="花圃（ㄏㄨㄚ ㄆㄨˇ）🌸 需要：食物8＋石頭3">
            <span class="building-icon"><img src="/lulu-village/assets/garden.png" alt="花圃"></span>
            <span class="plot-label">🌸 花圃</span>
          </button>
          <button class="plot plot-bed" data-building="bed" type="button" aria-label="魯魯貓窩" title="魯魯貓窩（ㄇㄠ ㄨ）🐱 需要：木頭6＋食物6">
            <span class="building-icon"><img src="/lulu-village/assets/bed.png" alt="貓窩"></span>
            <span class="plot-label">🐱 貓窩</span>
          </button>
          <div class="lulu" id="lulu" aria-label="魯魯">
            <img class="lulu-photo" src="/lulu-village/assets/lulu.jpg" alt="魯魯" />
          </div>
        </div>
      </section>

      <div class="speech" id="speech">你終於回來了，我才沒有等你喔。</div>

      <!-- 手機版收集按鈕（speech正下方，桌機隱藏） -->
      <div class="mobile-gather">
        <button class="mgather wood" data-gather="wood" type="button">🪵 收集木頭</button>
        <button class="mgather food" data-gather="food" type="button">🍎 收集食物</button>
        <button class="mgather stone" data-gather="stone" type="button">🪨 收集石頭</button>
      </div>

      <section class="panel">
        <div class="actions">
          <button class="primary" id="nextHint" type="button">看下一個目標</button>
          <button id="shareCard" type="button">產生分享卡</button>
          <button id="resetGame" type="button">重置</button>
        </div>
      </section>

      <!-- 手機版建築按鈕（桌機隱藏） -->
      <section class="mobile-build" aria-label="建築（手機版）">
        <div class="mobile-plots">
          <button class="mplot" data-building="home" type="button">🏠 小屋<small>木8＋石4</small></button>
          <button class="mplot" data-building="kitchen" type="button">🍳 廚房<small>木10＋食6＋石5</small></button>
          <button class="mplot" data-building="greenhouse" type="button">🌿 溫室<small>木12＋食10＋石6</small></button>
          <button class="mplot" data-building="garden" type="button">🌸 花圃<small>食8＋石3</small></button>
          <button class="mplot" data-building="bed" type="button">🐱 貓窩<small>木6＋食6</small></button>
        </div>
      </section>

      <section class="build-list" aria-label="建築清單">
        <article class="build-card" data-card="home">
          <h2>小屋</h2>
          <p>木頭 8、石頭 4</p>
        </article>
        <article class="build-card" data-card="kitchen">
          <h2>廚房</h2>
          <p>木頭 10、食物 6、石頭 5</p>
        </article>
        <article class="build-card" data-card="greenhouse">
          <h2>溫室</h2>
          <p>木頭 12、食物 10、石頭 6</p>
        </article>
        <article class="build-card" data-card="garden">
          <h2>花圃</h2>
          <p>食物 8、石頭 3</p>
        </article>
        <article class="build-card" data-card="bed">
          <h2>魯魯貓窩</h2>
          <p>木頭 6、食物 6</p>
        </article>
      </section>

      <!-- 答題覆蓋層 -->
      <div id="quizOverlay" class="quiz-overlay" style="display:none">
        <div class="quiz-card">
          <div class="quiz-header">
            <span class="quiz-subject" id="quizSubject">📐 數學</span>
            <span class="quiz-attempts-badge">還剩 <b id="quizAttemptsLeft">3</b> 次機會</span>
          </div>
          <p class="quiz-question" id="quizQuestion"></p>
          <div class="quiz-options" id="quizOptions"></div>
          <p class="quiz-feedback" id="quizFeedback"></p>
        </div>
      </div>

      <dialog id="shareDialog">
        <div class="share-card" id="sharePreview">
          <p>魯魯末日村 第 <span id="shareDay">1</span> 天</p>
          <h2 id="shareTitle">廢墟正在變成家</h2>
          <div class="share-scene">
            <span>木</span><span>食</span><span>石</span>
          </div>
          <blockquote id="shareQuote">好啦，我們來蓋個家。</blockquote>
        </div>
        <form method="dialog">
          <button type="submit">關閉</button>
        </form>
      </dialog>
    </main>
    <script src="/lulu-village/game.js"></script>
  </body>
</html>
