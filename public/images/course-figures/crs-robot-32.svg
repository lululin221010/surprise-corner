<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 560 224' width='560' height='224' style='font-family:sans-serif'><defs><marker id='ar' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#555'/></marker></defs><text x='280' y='22' font-size='12' fill='#333' font-weight='bold' text-anchor='middle'>能量密度比較（每公斤儲存的能量）</text><text x='75' y='56.3' font-size='9.5' fill='#374151' font-weight='bold' text-anchor='middle'>鋰電池</text><rect x='150' y='40' width='40.8' height='24' rx='5' fill='#ede9fe' stroke='#7c3aed' stroke-width='1.2'/><text x='196.8' y='56' font-size='9' fill='#777'>最低</text><text x='75' y='94.3' font-size='9.5' fill='#374151' font-weight='bold' text-anchor='middle'>氫燃料電池</text><rect x='150' y='78' width='153' height='24' rx='5' fill='#dbeafe' stroke='#2563eb' stroke-width='1.2'/><text x='75' y='132.3' font-size='9.5' fill='#374151' font-weight='bold' text-anchor='middle'>汽油</text><rect x='150' y='116' width='289' height='24' rx='5' fill='#fef3c7' stroke='#d97706' stroke-width='1.2'/><text x='75' y='170.3' font-size='9.5' fill='#374151' font-weight='bold' text-anchor='middle'>食物脂肪</text><rect x='150' y='154' width='340' height='24' rx='5' fill='#dcfce7' stroke='#16a34a' stroke-width='1.2'/><text x='496' y='170' font-size='9' fill='#777'>最高</text><text x='280' y='216' font-size='9' fill='#999' text-anchor='middle'>電池能量密度低，是機器人續航的根本瓶頸</text></svg>