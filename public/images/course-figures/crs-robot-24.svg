<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 560 126' width='560' height='126' style='font-family:sans-serif'><defs><marker id='ar' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#555'/></marker></defs><text x='280' y='22' font-size='12' fill='#333' font-weight='bold' text-anchor='middle'>人機協作的工作台</text><rect x='66' y='38' width='120' height='56' rx='7' fill='#ede9fe' stroke='#7c3aed' stroke-width='1.3'/><text x='126' y='61.7' font-size='10.5' fill='#374151' font-weight='bold' text-anchor='middle'>機器人</text><text x='126' y='79.2' font-size='9' fill='#555' text-anchor='middle'>搬運/重複工序</text><line x1='190' y1='66' x2='214' y2='66' stroke='#555' stroke-width='1.3' marker-end='url(#ar)'/><rect x='220' y='38' width='120' height='56' rx='7' fill='#dbeafe' stroke='#2563eb' stroke-width='1.3'/><text x='280' y='61.7' font-size='10.5' fill='#374151' font-weight='bold' text-anchor='middle'>同一工作台</text><text x='280' y='79.2' font-size='9' fill='#555' text-anchor='middle'>無圍欄</text><line x1='344' y1='66' x2='368' y2='66' stroke='#555' stroke-width='1.3' marker-end='url(#ar)'/><rect x='374' y='38' width='120' height='56' rx='7' fill='#fef3c7' stroke='#d97706' stroke-width='1.3'/><text x='434' y='61.7' font-size='10.5' fill='#374151' font-weight='bold' text-anchor='middle'>工人</text><text x='434' y='79.2' font-size='9' fill='#555' text-anchor='middle'>判斷/精細工序</text><text x='280' y='116' font-size='9' fill='#999' text-anchor='middle'>力道超過閾值自動停止，讓人跟機器能共享空間</text></svg>