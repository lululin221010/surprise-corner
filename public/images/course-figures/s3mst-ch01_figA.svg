<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 560 160' width='560' height='160' style='font-family:sans-serif'><rect x='60' y='110' width='440' height='36' rx='6' fill='#ede9fe' stroke='#7c3aed' stroke-width='1.5'/><text x='280' y='126' font-size='10' fill='#555' text-anchor='middle' font-weight='bold'>訓練知識（底層固定）</text><text x='280' y='140' font-size='8' fill='#777' text-anchor='middle'>固化在參數裡，所有人共用，不因對話改變</text><rect x='110' y='60' width='340' height='36' rx='6' fill='#dbeafe' stroke='#2563eb' stroke-width='1.5'/><text x='280' y='76' font-size='10' fill='#2563eb' text-anchor='middle' font-weight='bold'>對話上下文（臨時視窗）</text><text x='280' y='90' font-size='8' fill='#777' text-anchor='middle'>只在這次對話存在，視窗關閉就消失</text><rect x='160' y='10' width='240' height='36' rx='6' fill='#dcfce7' stroke='#16a34a' stroke-width='1.5'/><text x='280' y='26' font-size='10' fill='#166534' text-anchor='middle' font-weight='bold'>跨對話記憶（需外部儲存）</text><text x='280' y='40' font-size='8' fill='#777' text-anchor='middle'>特別設計的系統，存到外部資料庫再帶回</text></svg>
