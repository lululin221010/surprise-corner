<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 560 150' width='560' height='150' style='font-family:sans-serif'><defs><marker id="mc3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker></defs><text x='60' y='25' font-size='9' fill='#555'>對話初期：</text><rect x='130' y='12' width='300' height='20' rx='4' fill='#dbeafe' stroke='#2563eb' stroke-width='1.5'/><text x='280' y='26' font-size='8' fill='#2563eb' text-anchor='middle'>視窗涵蓋全部（開頭設定都看得見）</text><text x='60' y='70' font-size='9' fill='#555'>對話中期：</text><rect x='130' y='57' width='100' height='20' rx='4' fill='#f1f5f9' stroke='#cbd5e1' stroke-width='1'/><text x='180' y='71' font-size='8' fill='#94a3b8' text-anchor='middle'>開頭快超出</text><rect x='230' y='57' width='250' height='20' rx='4' fill='#dbeafe' stroke='#2563eb' stroke-width='1.5'/><text x='355' y='71' font-size='8' fill='#2563eb' text-anchor='middle'>視窗往後滑動</text><text x='60' y='115' font-size='9' fill='#555'>對話後期：</text><rect x='130' y='102' width='170' height='20' rx='4' fill='#fee2e2' stroke='#dc2626' stroke-width='1' stroke-dasharray='4,2'/><text x='215' y='116' font-size='8' fill='#dc2626' text-anchor='middle'>開頭設定被截斷＝不存在</text><rect x='300' y='102' width='230' height='20' rx='4' fill='#dbeafe' stroke='#2563eb' stroke-width='1.5'/><text x='415' y='116' font-size='8' fill='#2563eb' text-anchor='middle'>AI只看得見這段</text><text x='280' y='143' font-size='9' fill='#999' text-anchor='middle'>隨著對話推進，最早的內容被移出視窗，AI再也看不見</text></svg>
