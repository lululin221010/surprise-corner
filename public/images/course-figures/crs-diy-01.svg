<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 560 190' width='560' height='190' style='font-family:sans-serif'><defs><marker id='ar' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#555'/></marker></defs><text x='280' y='22' font-size='12' fill='#333' font-weight='bold' text-anchor='middle'>客製化程度：雲端AI vs 本地AI</text><rect x='18' y='36' width='250' height='26' rx='6' fill='#2563eb'/><text x='143' y='53' font-size='11' fill='#fff' font-weight='bold' text-anchor='middle'>雲端AI（固定）</text><rect x='18' y='66' width='250' height='28' rx='5' fill='#dbeafe' stroke='#2563eb' stroke-width='1'/><text x='143' y='83.3' font-size='9.5' fill='#374151' text-anchor='middle'>模型由平台決定</text><rect x='18' y='100' width='250' height='28' rx='5' fill='#dbeafe' stroke='#2563eb' stroke-width='1'/><text x='143' y='117.3' font-size='9.5' fill='#374151' text-anchor='middle'>記憶與偏好有限度</text><rect x='18' y='134' width='250' height='28' rx='5' fill='#dbeafe' stroke='#2563eb' stroke-width='1'/><text x='143' y='151.3' font-size='9.5' fill='#374151' text-anchor='middle'>內容政策統一套用</text><rect x='292' y='36' width='250' height='26' rx='6' fill='#16a34a'/><text x='417' y='53' font-size='11' fill='#fff' font-weight='bold' text-anchor='middle'>本地AI（可調整）</text><rect x='292' y='66' width='250' height='28' rx='5' fill='#dcfce7' stroke='#16a34a' stroke-width='1'/><text x='417' y='83.3' font-size='9.5' fill='#374151' text-anchor='middle'>自由換模型</text><rect x='292' y='100' width='250' height='28' rx='5' fill='#dcfce7' stroke='#16a34a' stroke-width='1'/><text x='417' y='117.3' font-size='9.5' fill='#374151' text-anchor='middle'>可餵自己的資料</text><rect x='292' y='134' width='250' height='28' rx='5' fill='#dcfce7' stroke='#16a34a' stroke-width='1'/><text x='417' y='151.3' font-size='9.5' fill='#374151' text-anchor='middle'>無使用次數限制</text></svg>