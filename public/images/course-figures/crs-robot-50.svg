<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 560 210' width='560' height='210' style='font-family:sans-serif'><defs><marker id='ar' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L0,6 L8,3 z' fill='#555'/></marker></defs><text x='280' y='22' font-size='12' fill='#333' font-weight='bold' text-anchor='middle'>人形機器人的關節自由度</text><rect x='21' y='38' width='162' height='62' rx='7' fill='#ede9fe' stroke='#7c3aed' stroke-width='1.3'/><text x='102' y='64.7' font-size='10.5' fill='#374151' font-weight='bold' text-anchor='middle'>頸部</text><text x='102' y='82.2' font-size='9' fill='#555' text-anchor='middle'>2-3自由度</text><rect x='199' y='38' width='162' height='62' rx='7' fill='#dbeafe' stroke='#2563eb' stroke-width='1.3'/><text x='280' y='64.7' font-size='10.5' fill='#374151' font-weight='bold' text-anchor='middle'>單隻手臂</text><text x='280' y='82.2' font-size='9' fill='#555' text-anchor='middle'>7自由度</text><rect x='377' y='38' width='162' height='62' rx='7' fill='#fef3c7' stroke='#d97706' stroke-width='1.3'/><text x='458' y='64.7' font-size='10.5' fill='#374151' font-weight='bold' text-anchor='middle'>單隻手掌</text><text x='458' y='82.2' font-size='9' fill='#555' text-anchor='middle'>11-20自由度</text><rect x='21' y='116' width='162' height='62' rx='7' fill='#dcfce7' stroke='#16a34a' stroke-width='1.3'/><text x='102' y='142.7' font-size='10.5' fill='#374151' font-weight='bold' text-anchor='middle'>腰部</text><text x='102' y='160.2' font-size='9' fill='#555' text-anchor='middle'>2-3自由度</text><rect x='199' y='116' width='162' height='62' rx='7' fill='#fee2e2' stroke='#dc2626' stroke-width='1.3'/><text x='280' y='142.7' font-size='10.5' fill='#374151' font-weight='bold' text-anchor='middle'>單腿</text><text x='280' y='160.2' font-size='9' fill='#555' text-anchor='middle'>6自由度</text><rect x='377' y='116' width='162' height='62' rx='7' fill='#ede9fe' stroke='#7c3aed' stroke-width='1.3'/><text x='458' y='142.7' font-size='10.5' fill='#374151' font-weight