<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 560 140' width='560' height='140' style='font-family:sans-serif'><defs><marker id="mh8" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker></defs><rect x='20' y='25' width='150' height='30' rx='10' fill='#ede9fe' stroke='#7c3aed' stroke-width='1.3'/><text x='95' y='44' font-size='8' fill='#555' text-anchor='middle'>「幫我寫一篇貼文」</text><line x1='95' y1='55' x2='95' y2='80' stroke='#555' stroke-width='1.2' marker-end='url(#mh8)'/><rect x='30' y='85' width='130' height='30' rx='5' fill='#fee2e2' stroke='#dc2626' stroke-width='1.3'/><text x='95' y='100' font-size='8' fill='#991b1b' text-anchor='middle'>方向猜錯、來回修改</text><text x='95' y='111' font-size='8' fill='#991b1b' text-anchor='middle'>多輪浪費</text><rect x='300' y='18' width='240' height='44' rx='10' fill='#ede9fe' stroke='#7c3aed' stroke-width='1.3'/><text x='420' y='34' font-size='8' fill='#555' text-anchor='middle'>「我是電商UI設計師，寫一篇給25-35歲</text><text x='420' y='48' font-size='8' fill='#555' text-anchor='middle'>上班族的IG貼文，輕鬆語氣，150字內」</text><line x1='420' y1='62' x2='420' y2='80' stroke='#555' stroke-width='1.2' marker-end='url(#mh8)'/><rect x='340' y='85' width='160' height='30' rx='5' fill='#dcfce7' stroke='#16a34a' stroke-width='1.3'/><text x='420' y='100' font-size='8' fill='#166534' text-anchor='middle'>一次到位或小幅微調</text><text x='420' y='111' font-size='8' fill='#166534' text-anchor='middle'>起點清楚、輸出貼合</text></svg>
